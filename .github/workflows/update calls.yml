name: Update EU Calls

on:
  schedule:
    - cron: "0 2 * * *"      # ogni notte alle 02:00 UTC → calls.json (open/forthcoming)
    - cron: "0 3 1 * *"      # il 1° di ogni mese alle 03:00 UTC → closed_calls.json
  workflow_dispatch:
    inputs:
      run_closed_calls:
        description: "Esegui anche scrape_closed_calls.py"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape open/forthcoming EU calls → calls.json
        run: python scrape_to_json.py --out calls.json
        timeout-minutes: 90

      - name: Scrape closed EU calls → closed_calls.json
        if: >
          github.event.schedule == '0 3 1 * *' ||
          github.event.inputs.run_closed_calls == 'true'
        run: python scrape_closed_calls.py --out closed_calls.json
        timeout-minutes: 500

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calls.json \
                  changelog.md \
                  changelog_history.md \
                  closed_calls.json \
                  closed_calls_autofill_index.json
          git diff --staged --quiet || git commit -m "chore: update calls [$(date -u +%Y-%m-%d)]"
          git push
