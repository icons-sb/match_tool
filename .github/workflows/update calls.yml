name: Update EU Calls

on:
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 3 1 * *"
  workflow_dispatch:
    inputs:
      run_closed_calls:
        description: "Esegui scraping call chiuse (5 batch paralleli)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  scrape-open:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Scrape open/forthcoming EU calls
        run: python scrape_to_json.py --out calls.json
        timeout-minutes: 90
      - name: Commit calls.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calls.json changelog.md changelog_history.md
          git diff --staged --quiet || git commit -m "chore: update open calls [$(date -u +%Y-%m-%d)]"
          git push

  scrape-closed-batch-1:
    if: >
      github.event.schedule == '0 3 1 * *' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.run_closed_calls == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium --with-deps
      - name: Scrape batch 1/5
        run: python scrape_closed_calls.py --batch 1 --total-batches 5 --out closed_calls_batch_1.json
        timeout-minutes: 340
      - uses: actions/upload-artifact@v4
        with:
          name: closed-batch-1
          path: closed_calls_batch_1.json
          retention-days: 1

  scrape-closed-batch-2:
    if: >
      github.event.schedule == '0 3 1 * *' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.run_closed_calls == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Scrape batch 2/5
        run: python scrape_closed_calls.py --batch 2 --total-batches 5 --out closed_calls_batch_2.json
        timeout-minutes: 340
      - uses: actions/upload-artifact@v4
        with:
          name: closed-batch-2
          path: closed_calls_batch_2.json
          retention-days: 1

  scrape-closed-batch-3:
    if: >
      github.event.schedule == '0 3 1 * *' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.run_closed_calls == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Scrape batch 3/5
        run: python scrape_closed_calls.py --batch 3 --total-batches 5 --out closed_calls_batch_3.json
        timeout-minutes: 340
      - uses: actions/upload-artifact@v4
        with:
          name: closed-batch-3
          path: closed_calls_batch_3.json
          retention-days: 1

  scrape-closed-batch-4:
    if: >
      github.event.schedule == '0 3 1 * *' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.run_closed_calls == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Scrape batch 4/5
        run: python scrape_closed_calls.py --batch 4 --total-batches 5 --out closed_calls_batch_4.json
        timeout-minutes: 340
      - uses: actions/upload-artifact@v4
        with:
          name: closed-batch-4
          path: closed_calls_batch_4.json
          retention-days: 1

  scrape-closed-batch-5:
    if: >
      github.event.schedule == '0 3 1 * *' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.run_closed_calls == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Scrape batch 5/5
        run: python scrape_closed_calls.py --batch 5 --total-batches 5 --out closed_calls_batch_5.json
        timeout-minutes: 340
      - uses: actions/upload-artifact@v4
        with:
          name: closed-batch-5
          path: closed_calls_batch_5.json
          retention-days: 1

  merge-and-commit:
    needs:
      - scrape-closed-batch-1
      - scrape-closed-batch-2
      - scrape-closed-batch-3
      - scrape-closed-batch-4
      - scrape-closed-batch-5
    if: >
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (
        needs.scrape-closed-batch-1.result == 'success' ||
        needs.scrape-closed-batch-2.result == 'success' ||
        needs.scrape-closed-batch-3.result == 'success' ||
        needs.scrape-closed-batch-4.result == 'success' ||
        needs.scrape-closed-batch-5.result == 'success'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download all batch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: closed-batch-*
          merge-multiple: true
          path: .
      - name: Merge batch files into closed_calls.json
        run: python merge_closed_calls.py --dir . --out closed_calls.json
      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add closed_calls.json closed_calls_autofill_index.json
          if git diff --staged --quiet; then
            echo "Nessuna modifica da committare"
          else
            git commit -m "chore: update closed calls [$(date -u +%Y-%m-%d)]"
            git pull --rebase origin main
            git push
          fi
